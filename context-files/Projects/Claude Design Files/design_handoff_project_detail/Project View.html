<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kin · Project View — Mobile & Desktop</title>
<style>
  html, body { margin: 0; padding: 0; background: #ebe2d8; font-family: -apple-system, "SF Pro Text", Inter, system-ui, sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="project-view.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

// Phone-shaped wrapper (no full iOS chrome — keeps canvas dense).
function PhoneShell({ children, w = 390, h = 844 }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: 44,
      background: '#0a0a0a', padding: 8,
      boxShadow: '0 30px 60px -20px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.4) inset',
      position: 'relative',
    }}>
      <div style={{ width: '100%', height: '100%', borderRadius: 36, overflow: 'hidden',
        background: '#f4ede6', position: 'relative' }}>
        {/* dynamic island */}
        <div style={{
          position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
          width: 116, height: 32, borderRadius: 16, background: '#000', zIndex: 200,
        }}/>
        {/* status bar */}
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: 50, zIndex: 100,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '14px 28px 0', color: '#fff', fontSize: 15, fontWeight: 600,
          fontFamily: '-apple-system, "SF Pro Text", system-ui',
          pointerEvents: 'none',
        }}>
          <span>9:41</span>
          <span style={{ display: 'inline-flex', gap: 5, alignItems: 'center' }}>
            <svg width="18" height="11" viewBox="0 0 18 11"><g fill="currentColor">
              <rect x="0"  y="7" width="3" height="4" rx="0.5"/>
              <rect x="5"  y="4" width="3" height="7" rx="0.5"/>
              <rect x="10" y="2" width="3" height="9" rx="0.5"/>
              <rect x="15" y="0" width="3" height="11" rx="0.5"/>
            </g></svg>
            <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor">
              <path d="M8 2.6c2 0 3.9.8 5.3 2.1l.9-.9C12.6 2.1 10.4 1.1 8 1.1S3.4 2.1 1.8 3.8l.9.9C4.1 3.4 6 2.6 8 2.6z"/>
              <path d="M8 5.6c1.2 0 2.3.5 3.1 1.3l.9-.9C11 4.9 9.6 4.3 8 4.3s-3 .6-4 1.7l.9.9C5.7 6.1 6.8 5.6 8 5.6z"/>
              <circle cx="8" cy="9" r="1.4"/>
            </svg>
            <svg width="26" height="12" viewBox="0 0 26 12">
              <rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke="currentColor" strokeOpacity="0.4"/>
              <rect x="2" y="2" width="19" height="8" rx="1.5" fill="currentColor"/>
              <rect x="23" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.4"/>
            </svg>
          </span>
        </div>
        <div style={{ width: '100%', height: '100%', paddingTop: 50, boxSizing: 'border-box' }}>
          {children}
        </div>
        {/* home indicator */}
        <div style={{
          position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
          width: 134, height: 5, borderRadius: 3, background: '#000', zIndex: 200,
        }}/>
      </div>
    </div>
  );
}

// SE / smaller phone — tests 320–375 width. We use 360 (close to iPhone SE/13 mini area).
function SmallPhoneShell({ children }) {
  return <PhoneShell w={360} h={760}>{children}</PhoneShell>;
}

function DesktopShell({ children, w = 1280, h = 880 }) {
  return (
    <div style={{ width: w, height: h, borderRadius: 14, overflow: 'hidden',
      background: '#fff', boxShadow: '0 30px 60px -20px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.06)' }}>
      {/* Browser chrome */}
      <div style={{
        height: 38, background: '#e8e2dc', display: 'flex', alignItems: 'center', gap: 10,
        padding: '0 14px', borderBottom: '1px solid rgba(0,0,0,0.06)',
      }}>
        <div style={{ display: 'flex', gap: 6 }}>
          <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#ff5f57' }}/>
          <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#febc2e' }}/>
          <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#28c840' }}/>
        </div>
        <div style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>
          <div style={{
            background: '#faf6f1', borderRadius: 7, padding: '4px 14px', fontSize: 12, color: '#7a716a',
            fontFamily: 'system-ui', maxWidth: 480,
          }}>🔒 kin.app/projects/18472</div>
        </div>
      </div>
      <div style={{ width: '100%', height: 'calc(100% - 38px)', overflowY: 'auto' }}>
        {children}
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="Kin · Project View"
      subtitle="iOS-flavored project hub for Kin Home — mobile-first, desktop ready. Drag to pan, scroll to zoom, click any artboard to focus."
    >
      <DCSection id="mobile" title="Mobile — ops-facing project detail" subtitle="Dark navy header · white cards on warm-beige · ops signal foregrounded">
        <DCArtboard id="mobile-overview" label="iPhone · Overview" width={406} height={860}>
          <PhoneShell><MobileProjectView/></PhoneShell>
        </DCArtboard>

        <DCArtboard id="mobile-feed" label="iPhone · Deal Feed" width={406} height={860}>
          <PhoneShell><MobileProjectView initialTab="feed"/></PhoneShell>
        </DCArtboard>

        <DCArtboard id="mobile-progress" label="iPhone · Progress timeline" width={406} height={860}>
          <PhoneShell><MobileProjectView initialTab="progress"/></PhoneShell>
        </DCArtboard>

        <DCArtboard id="mobile-comms" label="iPhone · Communications" width={406} height={860}>
          <PhoneShell><MobileProjectView initialTab="comms"/></PhoneShell>
        </DCArtboard>

        <DCArtboard id="mobile-tickets" label="iPhone · Tickets" width={406} height={860}>
          <PhoneShell><MobileProjectView initialTab="tickets"/></PhoneShell>
        </DCArtboard>

        <DCArtboard id="mobile-se" label="iPhone SE · Overview" width={376} height={780}>
          <SmallPhoneShell><MobileProjectView/></SmallPhoneShell>
        </DCArtboard>
      </DCSection>

      <DCSection id="desktop" title="Desktop — same components, 3-column ops layout" subtitle="Left: customer + specs · Center: Deal Feed · Right: progress + tickets">
        <DCArtboard id="desktop-overview" label="Desktop · Project Detail" width={1300} height={1100}>
          <DesktopShell><DesktopProjectView/></DesktopShell>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

// Wrapper so we can preset tab state for the variant artboards
function MobileVariant() { return null; }

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
